<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="予定登録">
    <title>Googleカレンダー予定登録</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 40px);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 22px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .content { padding: 16px; }
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #1565c0;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        button {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
        .btn-primary.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .btn-secondary { background: #f0f0f0; color: #333; width: 100%; margin-bottom: 8px; }
        .btn-green {
            background: linear-gradient(135deg, #34a853 0%, #1f9e3e 100%);
            color: white; width: 100%; padding: 16px;
            font-size: 16px; font-weight: 700; margin-top: 16px;
        }
        .btn-green:disabled { background: #ccc; }
        .text-display {
            background: #f9f9f9; border: 2px solid #e0e0e0;
            border-radius: 12px; padding: 14px; min-height: 80px;
            font-size: 14px; line-height: 1.6; color: #333; word-break: break-all;
        }
        .text-display.empty { color: #999; font-style: italic; }
        select, input[type="text"] {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 12px; font-size: 15px; font-family: inherit;
            background: white; margin-bottom: 8px; -webkit-appearance: none;
        }
        select:focus, input:focus { outline: none; border-color: #667eea; }
        .events-list { background: #f9f9f9; border-radius: 12px; padding: 12px; }
        .event-item {
            background: white; border-left: 4px solid #667eea;
            padding: 10px; margin-bottom: 8px; border-radius: 8px;
            font-size: 13px; line-height: 1.6;
        }
        .event-item:last-child { margin-bottom: 0; }
        .event-date { font-weight: 700; color: #333; }
        .event-time { color: #666; font-size: 12px; }
        .event-title { color: #667eea; font-weight: 600; }
        .no-events { color: #999; font-style: italic; text-align: center; padding: 16px; }
        .debug-box {
            background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px;
            padding: 8px; font-size: 11px; color: #666; margin-top: 8px;
            display: none; white-space: pre;
        }
        .status-message {
            text-align: center; margin-top: 10px; font-size: 13px;
            padding: 10px; border-radius: 8px; display: none; line-height: 1.5;
        }
        .status-message.success { background: #d4edda; color: #155724; display: block; }
        .status-message.error { background: #f8d7da; color: #721c24; display: block; }
        .status-message.loading { background: #cfe2ff; color: #084298; display: block; }
        .divider { height: 1px; background: #e0e0e0; margin: 16px 0; }
        .auth-status { text-align: center; font-size: 13px; color: #34a853; font-weight: 600; padding: 8px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 予定登録</h1>
        <p>複数の予定を一度にGoogleカレンダーへ</p>
    </div>
    <div class="content">
        <div class="section">
            <div class="section-title">🔐 Google認証</div>
            <button class="btn-primary" id="googleLoginBtn">🔓 Googleでサインイン</button>
            <div class="auth-status" id="authStatus">✅ ログイン済み</div>
        </div>
        <div class="divider"></div>
        <div class="section">
            <div class="section-title">📢 音声入力</div>
            <div class="info-box">「1月1日9時から3時、み仕事、1月2日10時から2時、卓球」のように話してください</div>
            <button class="btn-primary" id="recordBtn">🎤 タップして話す</button>
            <button class="btn-secondary" id="clearBtn">🗑️ クリア</button>
        </div>
        <div class="section">
            <div class="section-title">📝 認識テキスト</div>
            <div class="text-display empty" id="textDisplay">タップして音声入力してください</div>
        </div>
        <div class="divider"></div>
        <div class="section">
            <div class="section-title">🏷️ デフォルトタイトル</div>
            <select id="titleSelect">
                <option value="">タイトルを選択（任意）</option>
                <option value="み　仕事">み　仕事</option>
                <option value="卓球">卓球</option>
                <option value="ここせん">ここせん</option>
                <option value="ひ">ひ</option>
                <option value="み">み</option>
                <option value="純">純</option>
                <option value="成">成</option>
                <option value="想">想</option>
                <option value="custom">その他（手動入力）</option>
            </select>
            <input type="text" id="customInput" placeholder="タイトルを入力" style="display:none;">
        </div>
        <div class="divider"></div>
        <div class="section">
            <div class="section-title">📋 抽出された予定</div>
            <div class="events-list" id="eventsList">
                <div class="no-events">予定が検出されていません</div>
            </div>
            <div class="debug-box" id="debugBox"></div>
        </div>
        <button class="btn-green" id="registerBtn" disabled>✓ Googleカレンダーに登録</button>
        <div class="status-message" id="statusMessage"></div>
    </div>
</div>
<script>
const GOOGLE_CLIENT_ID = '8880616614-a28l4bdoaias61s7hi36pgrvrhbfc117.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar';
const GOOGLE_CALENDAR_ID = 'primary';
const recordBtn = document.getElementById('recordBtn');
const clearBtn = document.getElementById('clearBtn');
const textDisplay = document.getElementById('textDisplay');
const titleSelect = document.getElementById('titleSelect');
const customInput = document.getElementById('customInput');
const eventsList = document.getElementById('eventsList');
const registerBtn = document.getElementById('registerBtn');
const statusMessage = document.getElementById('statusMessage');
const googleLoginBtn = document.getElementById('googleLoginBtn');
const authStatus = document.getElementById('authStatus');
const debugBox = document.getElementById('debugBox');
let recognitionText = '';
let extractedEvents = [];
let isRecording = false;
let recognition = null;
let googleAccessToken = null;

function kanjiToNum(str) {
    return str
        .replace(/二十([一二三四五六七八九])/g, (_, n) => String(20 + '一二三四五六七八九'.indexOf(n) + 1))
        .replace(/十([一二三四五六七八九])/g, (_, n) => String(10 + '一二三四五六七八九'.indexOf(n) + 1))
        .replace(/二十/g, '20').replace(/十/g, '10')
        .replace(/一/g, '1').replace(/二/g, '2').replace(/三/g, '3')
        .replace(/四/g, '4').replace(/五/g, '5').replace(/六/g, '6')
        .replace(/七/g, '7').replace(/八/g, '8').replace(/九/g, '9').replace(/〇/g, '0');
}

window.addEventListener('load', () => {
    const hash = window.location.hash;
    if (hash && hash.includes('error')) {
        const params = new URLSearchParams(hash.substring(1));
        const error = params.get('error');
        history.replaceState(null, null, window.location.pathname);
        if (error === 'access_denied') {
            showStatus('❌ アクセス拒否。Google Cloud ConsoleのテストユーザーにあなたのGmailを追加してください。', 'error');
        } else {
            showStatus('❌ Google認証エラー: ' + error, 'error');
        }
        return;
    }
    if (hash && hash.includes('access_token')) {
        const params = new URLSearchParams(hash.substring(1));
        googleAccessToken = params.get('access_token');
        const expiresIn = parseInt(params.get('expires_in')) || 3600;
        localStorage.setItem('google_access_token', googleAccessToken);
        localStorage.setItem('google_token_expiry', new Date(Date.now() + expiresIn * 1000).toISOString());
        history.replaceState(null, null, window.location.pathname);
        updateAuthUI();
        showStatus('✅ Googleアカウントでログインしました！', 'success');
        return;
    }
    const savedToken = localStorage.getItem('google_access_token');
    const savedExpiry = localStorage.getItem('google_token_expiry');
    if (savedToken && savedExpiry && new Date(savedExpiry) > new Date()) {
        googleAccessToken = savedToken;
        updateAuthUI();
    }
});

googleLoginBtn.addEventListener('click', () => {
    if (googleAccessToken) {
        googleAccessToken = null;
        localStorage.removeItem('google_access_token');
        localStorage.removeItem('google_token_expiry');
        updateAuthUI();
        showStatus('ログアウトしました', 'success');
        return;
    }
    const redirectUri = 'https://imaimaimai24-hash.github.io/imaimaimai24.github.io/calendar-app.html';
    const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
    authUrl.searchParams.append('client_id', GOOGLE_CLIENT_ID);
    authUrl.searchParams.append('redirect_uri', redirectUri);
    authUrl.searchParams.append('response_type', 'token');
    authUrl.searchParams.append('scope', GOOGLE_SCOPES);
    authUrl.searchParams.append('prompt', 'consent');
    window.location.href = authUrl.toString();
});

function updateAuthUI() {
    if (googleAccessToken) {
        googleLoginBtn.textContent = '✅ ログイン済み（タップでログアウト）';
        googleLoginBtn.style.background = 'linear-gradient(135deg, #34a853, #1f9e3e)';
        authStatus.style.display = 'block';
    } else {
        googleLoginBtn.textContent = '🔓 Googleでサインイン';
        googleLoginBtn.style.background = '';
        authStatus.style.display = 'none';
    }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => {
        isRecording = true;
        recordBtn.classList.add('recording');
        recordBtn.textContent = '⏹️ タップして停止';
        textDisplay.textContent = '聞き取り中...';
        textDisplay.classList.remove('empty');
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        recognitionText += transcript;
        textDisplay.textContent = recognitionText;
        textDisplay.classList.remove('empty');
        parseEvents();
    };
    recognition.onerror = (event) => {
        isRecording = false;
        recordBtn.classList.remove('recording');
        recordBtn.textContent = '🎤 タップして話す';
        if (event.error !== 'no-speech') showStatus('エラー: ' + event.error, 'error');
    };
    recognition.onend = () => {
        isRecording = false;
        recordBtn.classList.remove('recording');
        recordBtn.textContent = '🎤 タップして話す';
    };
}

recordBtn.addEventListener('click', () => {
    if (!recognition) { showStatus('このブラウザは音声認識に対応していません', 'error'); return; }
    if (isRecording) recognition.stop(); else recognition.start();
});

clearBtn.addEventListener('click', () => {
    recognitionText = '';
    textDisplay.textContent = 'タップして音声入力してください';
    textDisplay.classList.add('empty');
    extractedEvents = [];
    eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
    debugBox.style.display = 'none';
    registerBtn.disabled = true;
    statusMessage.className = 'status-message';
});

titleSelect.addEventListener('change', () => {
    customInput.style.display = titleSelect.value === 'custom' ? 'block' : 'none';
    if (recognitionText) parseEvents();
});

function parseEvents() {
    const rawText = recognitionText.trim();
    if (!rawText) return;
    const text = kanjiToNum(rawText);
    extractedEvents = [];
    const defaultTitle = titleSelect.value === 'custom' ? customInput.value : titleSelect.value;
    const parts = text.split(/(?=\d{1,2}月\d{1,2}日)/).filter(p => p.trim() && /\d{1,2}月\d{1,2}日/.test(p));
    const segments = parts.map(p => p.trim());
    let debugText = '分割ブロック: ' + segments.length + '件\n';
    segments.forEach((s, i) => { debugText += '[' + (i+1) + '] ' + s.substring(0, 20) + '\n'; });
    debugBox.textContent = debugText;
    debugBox.style.display = 'block';
    for (const seg of segments) {
        const event = parseSegment(seg, defaultTitle);
        if (event) extractedEvents.push(event);
    }
    displayEvents();
    registerBtn.disabled = extractedEvents.length === 0 || !googleAccessToken;
    if (segments.length > 0 && extractedEvents.length < segments.length) {
        showStatus('⚠️ ' + segments.length + '件中' + extractedEvents.length + '件を解析しました', 'error');
    }
}

function pad(n) { return String(n).padStart(2, '0'); }

function parseSegment(seg, defaultTitle) {
    const dateMatch = seg.match(/(\d{1,2})月(\d{1,2})日/);
    if (!dateMatch) return null;
    const date = dateMatch[1] + '月' + dateMatch[2] + '日';
    const afterDate = seg.substring(dateMatch.index + dateMatch[0].length)
        .replace(/^[のはにで、,，\s　]+/, '').trim();
    const timeMatch = afterDate.match(
        /(?:午前|午後)?(\d{1,2})[時：:]((\d{1,2})分?)?\s*(?:半)?\s*(?:から|〜|～|ー)\s*(?:午前|午後)?(\d{1,2})[時：:]?((\d{1,2})分?)?\s*(?:半)?/
    );
    if (!timeMatch) {
        const m2 = afterDate.match(/(?:午前|午後)?(\d{1,2})\s*(?:から|〜|～|ー)\s*(?:午前|午後)?(\d{1,2})[時：:]?((\d{1,2})分?)?/);
        if (!m2) return null;
        let sH = parseInt(m2[1]), eH = parseInt(m2[2]), eM = m2[3] ? parseInt(m2[3]) : 0;
        if (eH < sH && eH <= 12) eH += 12;
        const afterTime2 = afterDate.substring(m2.index + m2[0].length).trim();
        return { date, startTime: pad(sH)+':00', endTime: pad(eH)+':'+pad(eM), title: extractTitle(afterTime2, defaultTitle), location: '' };
    }
    let sH = parseInt(timeMatch[1]), sM = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
    const beforeFrom = afterDate.substring(0, afterDate.search(/から|〜|～|ー/));
    if (/半/.test(beforeFrom)) sM = 30;
    let eH = parseInt(timeMatch[4]), eM = timeMatch[5] ? parseInt(timeMatch[5]) : 0;
    const afterFrom = afterDate.substring(afterDate.search(/から|〜|～|ー/));
    if (/半/.test(afterFrom)) eM = 30;
    if (eH !== 0 && eH < sH && eH <= 12) eH += 12;
    const afterTime = afterDate.substring(timeMatch.index + timeMatch[0].length).trim();
    return { date, startTime: pad(sH)+':'+pad(sM), endTime: pad(eH)+':'+pad(eM), title: extractTitle(afterTime, defaultTitle), location: '' };
}

function extractTitle(afterTime, defaultTitle) {
    let title = defaultTitle || '予定';
    if (!afterTime) return title;
    const cleaned = afterTime.replace(/^[、,，\s　。．]+/, '').trim();
    if (!cleaned) return title;
    const parts = cleaned.split(/[、,，\s　。．]+/).filter(p => p.trim());
    if (parts.length > 0 && parts[0].trim()) title = parts[0].trim();
    return title;
}

function displayEvents() {
    if (extractedEvents.length === 0) {
        eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
        return;
    }
    eventsList.innerHTML = extractedEvents.map(e =>
        '<div class="event-item">' +
        '<div class="event-date">📅 ' + e.date + '</div>' +
        '<div class="event-time">⏰ ' + e.startTime + ' → ' + e.endTime + '</div>' +
        '<div class="event-title">🏷️ ' + e.title + '</div>' +
        (e.location ? '<div style="color:#999;font-size:12px">📍 ' + e.location + '</div>' : '') +
        '</div>'
    ).join('');
}

registerBtn.addEventListener('click', async () => {
    if (!googleAccessToken) { showStatus('先にGoogleでサインインしてください', 'error'); return; }
    if (extractedEvents.length === 0) return;
    registerBtn.disabled = true;
    showStatus('登録中...', 'loading');
    try {
        for (const event of extractedEvents) await createEvent(event);
        showStatus('✅ ' + extractedEvents.length + '件の予定を登録しました！', 'success');
        clearBtn.click();
    } catch (e) {
        if (e.message && e.message.includes('401')) {
            googleAccessToken = null;
            localStorage.removeItem('google_access_token');
            localStorage.removeItem('google_token_expiry');
            updateAuthUI();
            showStatus('❌ ログイン期限切れ。再度サインインしてください。', 'error');
        } else {
            showStatus('❌ エラー: ' + e.message, 'error');
        }
        registerBtn.disabled = false;
    }
});

async function createEvent(eventData) {
    const [m, d] = eventData.date.match(/(\d{1,2})月(\d{1,2})日/).slice(1);
    const year = new Date().getFullYear();
    const [sh, sm] = eventData.startTime.split(':').map(Number);
    const [eh, em] = eventData.endTime.split(':').map(Number);
    let start = new Date(year, parseInt(m)-1, parseInt(d), sh, sm);
    let end = new Date(year, parseInt(m)-1, parseInt(d), eh, em);
    if (start < new Date()) { start.setFullYear(year+1); end.setFullYear(year+1); }
    const body = {
        summary: eventData.title,
        location: eventData.location || '',
        start: { dateTime: start.toISOString(), timeZone: 'Asia/Tokyo' },
        end: { dateTime: end.toISOString(), timeZone: 'Asia/Tokyo' }
    };
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/' + GOOGLE_CALENDAR_ID + '/events', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + googleAccessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || '登録失敗 (' + res.status + ')'); }
    return res.json();
}

function showStatus(msg, type) {
    statusMessage.className = 'status-message ' + type;
    statusMessage.textContent = msg;
    if (type === 'success') setTimeout(() => statusMessage.className = 'status-message', 5000);
}
</script>
</body>
</html>
