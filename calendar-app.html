<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffe0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="予定登録">
    <title>Googleカレンダー予定登録</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #ffe0ff 0%, #e0ffff 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 40px);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(180,140,200,0.22);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ffe0ff 0%, #ffffe0 50%, #e0ffff 100%);
            color: #886688;
            padding: 22px 20px;
            text-align: center;
        }

        .header h1 { font-size: 22px; margin-bottom: 4px; color: #aa55aa; }
        .header p { font-size: 12px; opacity: 0.85; color: #997799; }

        .content { padding: 16px; }

        .section { margin-bottom: 20px; }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #bb77cc;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box {
            background: #ffffe0;
            border-left: 4px solid #cccc66;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #887733;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffe0ff 0%, #e0ffff 100%);
            color: #7755aa;
            width: 100%;
            margin-bottom: 8px;
            box-shadow: 0 4px 12px rgba(200,150,220,0.3);
            border: 1px solid rgba(200,150,220,0.4);
        }

        .btn-primary:active { opacity: 0.8; transform: scale(0.98); }

        .btn-secondary {
            background: #ffffe0;
            color: #887733;
            width: 100%;
            margin-bottom: 8px;
            font-weight: 600;
            border: 1px solid rgba(200,200,100,0.4);
        }

        .btn-green {
            background: linear-gradient(135deg, #e0ffff 0%, #ffffe0 100%);
            color: #337766;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(150,220,200,0.3);
            border: 1px solid rgba(150,220,200,0.4);
        }

        .btn-green:disabled { background: #ddd; box-shadow: none; color: #aaa; }

        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0ffff;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: #f8fff8;
            margin-bottom: 8px;
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
            color: #333;
        }

        textarea:focus {
            outline: none;
            border-color: #ffe0ff;
        }

        textarea::placeholder {
            color: #bbaacc;
            font-style: italic;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0ffff;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: white;
            margin-bottom: 8px;
            -webkit-appearance: none;
            color: #555;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ffe0ff;
        }

        .events-list {
            background: #f8ffff;
            border-radius: 12px;
            padding: 12px;
        }

        .event-item {
            background: white;
            border-left: 4px solid #ddaaff;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 2px 6px rgba(180,140,220,0.12);
        }

        .event-item:last-child { margin-bottom: 0; }
        .event-date { font-weight: 700; color: #554466; }
        .event-time { color: #55aaaa; font-size: 12px; font-weight: 600; }
        .event-title { color: #bb66cc; font-weight: 700; }

        .no-events { color: #bbaacc; font-style: italic; text-align: center; padding: 16px; }

        .debug-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            display: none;
            white-space: pre-wrap;
        }

        .status-message {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            padding: 10px;
            border-radius: 10px;
            display: none;
            line-height: 1.5;
        }

        .status-message.success { background: #e0ffee; color: #226633; display: block; }
        .status-message.error { background: #ffe0ff; color: #882244; display: block; }
        .status-message.loading { background: #e0ffff; color: #224488; display: block; }

        .divider { height: 1px; background: linear-gradient(90deg, #ffe0ff, #e0ffff); margin: 16px 0; }

        .auth-status {
            text-align: center;
            font-size: 13px;
            color: #55aaaa;
            font-weight: 600;
            padding: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 予定登録</h1>
        <p>複数の予定を一度にGoogleカレンダーへ</p>
    </div>

    <div class="content">

        <!-- Google認証 -->
        <div class="section">
            <div class="section-title">🔐 Google認証</div>
            <button class="btn-primary" id="googleLoginBtn">🔓 Googleでサインイン</button>
            <div class="auth-status" id="authStatus">✅ ログイン済み</div>
        </div>

        <div class="divider"></div>

        <!-- テキスト入力 -->
        <div class="section">
            <div class="section-title">📝 予定テキスト入力</div>
            <div class="info-box">
                「4月5日9時から17時仕事、4月6日10時から15時卓球」のように<br>日付・時間・タイトルの順で入力してください<br>iPhoneのキーボードのマイクボタンで音声入力もできます🎤
            </div>
            <textarea id="textInput" placeholder="ここに予定を入力してください&#10;例：4月5日9時から17時仕事、4月6日10時から15時卓球"></textarea>
            <button class="btn-secondary" id="clearBtn">🗑️ クリア</button>
        </div>

        <div class="divider"></div>

        <!-- タイトル選択 -->
        <div class="section">
            <div class="section-title">🏷️ デフォルトタイトル（入力しない場合）</div>
            <select id="titleSelect">
                <option value="">タイトルを選択（任意）</option>
                <option value="み　仕事">み　仕事</option>
                <option value="卓球">卓球</option>
                <option value="ここせん">ここせん</option>
                <option value="ひ">ひ</option>
                <option value="み">み</option>
                <option value="純">純</option>
                <option value="成">成</option>
                <option value="想">想</option>
                <option value="custom">その他（手動入力）</option>
            </select>
            <input type="text" id="customInput" placeholder="タイトルを入力" style="display:none;">
        </div>

        <div class="divider"></div>

        <!-- 抽出された予定 -->
        <div class="section">
            <div class="section-title">📋 抽出された予定</div>
            <div class="events-list" id="eventsList">
                <div class="no-events">予定が検出されていません</div>
            </div>
            <div class="debug-box" id="debugBox"></div>
        </div>

        <!-- 登録ボタン -->
        <button class="btn-green" id="registerBtn" disabled>✓ Googleカレンダーに登録</button>

        <!-- ステータス -->
        <div class="status-message" id="statusMessage"></div>

    </div>
</div>

<script>
// ===== 設定 =====
const GOOGLE_CLIENT_ID = '8880616614-a28l4bdoaias61s7hi36pgrvrhbfc117.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar';
const GOOGLE_CALENDAR_ID = 'primary';

// ===== 要素 =====
const textInput = document.getElementById('textInput');
const clearBtn = document.getElementById('clearBtn');
const titleSelect = document.getElementById('titleSelect');
const customInput = document.getElementById('customInput');
const eventsList = document.getElementById('eventsList');
const registerBtn = document.getElementById('registerBtn');
const statusMessage = document.getElementById('statusMessage');
const googleLoginBtn = document.getElementById('googleLoginBtn');
const authStatus = document.getElementById('authStatus');
const debugBox = document.getElementById('debugBox');

let extractedEvents = [];
let googleAccessToken = null;

// ===== 漢字数字→アラビア数字変換 =====
function kanjiToNum(str) {
    return str
        .replace(/([一二三四五六七八九]?)十([一二三四五六七八九]?)/g, (_, tens, ones) => {
            const t = tens ? '一二三四五六七八九'.indexOf(tens) + 2 : 1;
            const o = ones ? '一二三四五六七八九'.indexOf(ones) + 1 : 0;
            return String(t * 10 + o);
        })
        .replace(/一/g, '1').replace(/二/g, '2').replace(/三/g, '3')
        .replace(/四/g, '4').replace(/五/g, '5').replace(/六/g, '6')
        .replace(/七/g, '7').replace(/八/g, '8').replace(/九/g, '9')
        .replace(/〇/g, '0');
}

// ===== ページ読み込み時：トークン確認 =====
window.addEventListener('load', () => {
    const hash = window.location.hash;

    if (hash && hash.includes('error')) {
        const params = new URLSearchParams(hash.substring(1));
        const error = params.get('error');
        history.replaceState(null, null, window.location.pathname);
        if (error === 'access_denied') {
            showStatus('❌ アクセスが拒否されました。Google Cloud Consoleのテストユーザーにあなたのメールを追加してください。', 'error');
        } else {
            showStatus('❌ Google認証エラー: ' + error, 'error');
        }
        return;
    }

    if (hash && hash.includes('access_token')) {
        const params = new URLSearchParams(hash.substring(1));
        googleAccessToken = params.get('access_token');
        const expiresIn = parseInt(params.get('expires_in')) || 3600;
        const expiry = new Date(Date.now() + expiresIn * 1000);
        localStorage.setItem('google_access_token', googleAccessToken);
        localStorage.setItem('google_token_expiry', expiry.toISOString());
        history.replaceState(null, null, window.location.pathname);
        updateAuthUI();
        showStatus('✅ Googleアカウントでログインしました！', 'success');
        return;
    }

    const savedToken = localStorage.getItem('google_access_token');
    const savedExpiry = localStorage.getItem('google_token_expiry');
    if (savedToken && savedExpiry && new Date(savedExpiry) > new Date()) {
        googleAccessToken = savedToken;
        updateAuthUI();
    }
});

// ===== Google認証 =====
googleLoginBtn.addEventListener('click', () => {
    if (googleAccessToken) {
        googleAccessToken = null;
        localStorage.removeItem('google_access_token');
        localStorage.removeItem('google_token_expiry');
        updateAuthUI();
        showStatus('ログアウトしました', 'success');
        return;
    }
    const redirectUri = 'https://imaimaimai24-hash.github.io/imaimaimai24.github.io/calendar-app.html';
    const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
    authUrl.searchParams.append('client_id', GOOGLE_CLIENT_ID);
    authUrl.searchParams.append('redirect_uri', redirectUri);
    authUrl.searchParams.append('response_type', 'token');
    authUrl.searchParams.append('scope', GOOGLE_SCOPES);
    authUrl.searchParams.append('prompt', 'consent');
    window.location.href = authUrl.toString();
});

function updateAuthUI() {
    if (googleAccessToken) {
        googleLoginBtn.textContent = '✅ ログイン済み（タップでログアウト）';
        googleLoginBtn.style.background = 'linear-gradient(135deg, #e0ffff, #ffffe0)';
        authStatus.style.display = 'block';
    } else {
        googleLoginBtn.textContent = '🔓 Googleでサインイン';
        googleLoginBtn.style.background = '';
        authStatus.style.display = 'none';
    }
}

// ===== テキスト入力イベント =====
textInput.addEventListener('input', () => {
    parseEvents();
});

clearBtn.addEventListener('click', () => {
    textInput.value = '';
    extractedEvents = [];
    eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
    debugBox.style.display = 'none';
    registerBtn.disabled = true;
    statusMessage.className = 'status-message';
});

titleSelect.addEventListener('change', () => {
    customInput.style.display = titleSelect.value === 'custom' ? 'block' : 'none';
    if (textInput.value.trim()) parseEvents();
});

// ===== 日程解析 =====
function parseEvents() {
    const rawText = textInput.value.trim();
    if (!rawText) {
        extractedEvents = [];
        eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
        debugBox.style.display = 'none';
        registerBtn.disabled = true;
        return;
    }

    const text = kanjiToNum(rawText);
    extractedEvents = [];
    const defaultTitle = titleSelect.value === 'custom' ? customInput.value : titleSelect.value;

    const parts = text.split(/(?=\d{1,2}月\d{1,2}日)/).filter(p => p.trim() && /\d{1,2}月\d{1,2}日/.test(p));
    const segments = parts.map(p => p.trim());

    let debugText = `📊 分割ブロック: ${segments.length}件\n`;
    segments.forEach((s, i) => { debugText += `[${i+1}] ${s.substring(0, 35)}\n`; });
    debugBox.textContent = debugText;
    debugBox.style.display = 'block';

    for (const seg of segments) {
        const event = parseSegment(seg, defaultTitle);
        if (event) extractedEvents.push(event);
    }

    displayEvents();
    registerBtn.disabled = extractedEvents.length === 0 || !googleAccessToken;

    if (segments.length > 0 && extractedEvents.length < segments.length) {
        const missed = segments.length - extractedEvents.length;
        showStatus(`⚠️ ${segments.length}件中 ${extractedEvents.length}件を解析しました（${missed}件は時間が読み取れませんでした）`, 'error');
    }
}

function parseSegment(seg, defaultTitle) {
    const dateMatch = seg.match(/(\d{1,2})月(\d{1,2})日/);
    if (!dateMatch) return null;

    const date = `${dateMatch[1]}月${dateMatch[2]}日`;
    const afterDate = seg.substring(dateMatch.index + dateMatch[0].length)
        .replace(/^[のはにでもかから、,，\s　]+/, '')
        .trim();

    // パターン1: 「9時から17時」「9時〜17時」「9時30分から17時」
    const timeMatch = afterDate.match(
        /(?:午前|午後)?(\d{1,2})[時：:]((\d{1,2})分?)?\s*(?:半)?\s*(?:から|〜|～|ー|まで)\s*(?:午前|午後)?(\d{1,2})[時：:]?((\d{1,2})分?)?\s*(?:半)?/
    );

    if (!timeMatch) {
        // パターン2: 「9から17時」
        const timeMatch2 = afterDate.match(
            /(?:午前|午後)?(\d{1,2})\s*(?:から|〜|～|ー)\s*(?:午前|午後)?(\d{1,2})[時：:]?((\d{1,2})分?)?/
        );
        if (!timeMatch2) return null;

        let startH = parseInt(timeMatch2[1]);
        let endH = parseInt(timeMatch2[2]);
        let endM = timeMatch2[3] ? parseInt(timeMatch2[3]) : 0;
        if (endH < startH && endH <= 12) endH += 12;

        const startTime = `${String(startH).padStart(2,'0')}:00`;
        const endTime = `${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
        const beforeTime2 = afterDate.substring(0, timeMatch2.index).trim();
        const afterTime2 = afterDate.substring(timeMatch2.index + timeMatch2[0].length).trim();
        const title = extractTitle(afterTime2, defaultTitle, beforeTime2);
        return { date, startTime, endTime, title };
    }

    let startH = parseInt(timeMatch[1]);
    let startM = timeMatch[2] ? parseInt(timeMatch[2]) : 0;

    const beforeFrom = afterDate.substring(0, timeMatch.index + timeMatch[1].length + 1);
    if (/半/.test(beforeFrom.split(/から|〜|～/)[0])) startM = 30;

    let endH = parseInt(timeMatch[4]);
    let endM = timeMatch[5] ? parseInt(timeMatch[5]) : 0;

    const afterFrom = afterDate.substring(afterDate.search(/から|〜|～|ー/));
    if (/半/.test(afterFrom)) endM = 30;

    if (endH < startH && endH <= 12) endH += 12;

    const startTime = `${String(startH).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
    const endTime = `${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;

    const beforeTime = afterDate.substring(0, timeMatch.index).trim();
    const afterTimeStr = afterDate.substring(timeMatch.index + timeMatch[0].length).trim();
    const title = extractTitle(afterTimeStr, defaultTitle, beforeTime);

    return { date, startTime, endTime, title };
}

function extractTitle(afterTime, defaultTitle, beforeTime = '') {
    let title = defaultTitle || '予定';

    if (afterTime) {
        const cleaned = afterTime
            .replace(/^[まで間でにはのもかから、,，\s　。．]+/, '')
            .trim();
        if (cleaned) {
            const parts = cleaned.split(/[、,，\s　。．]+/).filter(p => p.trim());
            if (parts.length > 0 && parts[0].trim()) {
                return parts[0].trim();
            }
        }
    }

    if (beforeTime) {
        const bcleaned = beforeTime
            .replace(/^[のはにでもかから、,，\s　。．]+/, '')
            .replace(/[のはにでもかから、,，\s　。．]+$/, '')
            .trim();
        if (bcleaned && !/^\d+$/.test(bcleaned)) {
            title = bcleaned;
        }
    }

    return title;
}

function displayEvents() {
    if (extractedEvents.length === 0) {
        eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
        return;
    }
    eventsList.innerHTML = extractedEvents.map(e => `
        <div class="event-item">
            <div class="event-date">🗓 ${e.date}</div>
            <div class="event-time">🕐 ${e.startTime} → ${e.endTime}</div>
            <div class="event-title">🌸 ${e.title}</div>
        </div>
    `).join('');
}

// ===== Google Calendar 登録 =====
registerBtn.addEventListener('click', async () => {
    if (!googleAccessToken) {
        showStatus('先にGoogleでサインインしてください', 'error');
        return;
    }
    if (extractedEvents.length === 0) return;

    registerBtn.disabled = true;
    showStatus('登録中...', 'loading');

    let successCount = 0;
    const errors = [];

    for (const event of extractedEvents) {
        try {
            await createEvent(event);
            successCount++;
        } catch (e) {
            if (e.message && e.message.includes('401')) {
                googleAccessToken = null;
                localStorage.removeItem('google_access_token');
                localStorage.removeItem('google_token_expiry');
                updateAuthUI();
                showStatus('❌ ログインの有効期限が切れました。再度サインインしてください。', 'error');
                registerBtn.disabled = false;
                return;
            }
            errors.push(`${event.date} ${event.title}: ${e.message}`);
        }
    }

    if (errors.length === 0) {
        showStatus(`✅ ${successCount}件の予定を登録しました！`, 'success');
        clearBtn.click();
    } else if (successCount > 0) {
        showStatus(`⚠️ ${successCount}件成功、${errors.length}件失敗：${errors.join(' / ')}`, 'error');
        registerBtn.disabled = false;
    } else {
        showStatus(`❌ 登録失敗：${errors.join(' / ')}`, 'error');
        registerBtn.disabled = false;
    }
});

async function createEvent(eventData) {
    const [m, d] = eventData.date.match(/(\d{1,2})月(\d{1,2})日/).slice(1);
    const year = new Date().getFullYear();
    const [sh, sm] = eventData.startTime.split(':').map(Number);
    const [eh, em] = eventData.endTime.split(':').map(Number);

    let start = new Date(year, parseInt(m)-1, parseInt(d), sh, sm);
    let end = new Date(year, parseInt(m)-1, parseInt(d), eh, em);

    if (start < new Date()) {
        start.setFullYear(year + 1);
        end.setFullYear(year + 1);
    }

    const body = {
        summary: eventData.title,
        start: { dateTime: start.toISOString(), timeZone: 'Asia/Tokyo' },
        end: { dateTime: end.toISOString(), timeZone: 'Asia/Tokyo' }
    };

    const res = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${GOOGLE_CALENDAR_ID}/events`,
        {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${googleAccessToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        }
    );

    if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `登録失敗 (${res.status})`);
    }
    return res.json();
}

function showStatus(msg, type) {
    statusMessage.className = `status-message ${type}`;
    statusMessage.textContent = msg;
    if (type === 'success') {
        setTimeout(() => statusMessage.className = 'status-message', 5000);
    }
}
</script>
</body>
</html>
