<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4285F4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="予定登録">
    <title>Googleカレンダー予定登録</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: 40px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .voice-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:active {
            background: #e0e0e0;
        }

        .text-display {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            min-height: 100px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .text-display.empty {
            color: #999;
            font-style: italic;
        }

        .title-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .title-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .custom-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            display: none;
        }

        .custom-input.show {
            display: block;
        }

        .custom-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .events-list {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .event-item:last-child {
            margin-bottom: 0;
        }

        .event-date {
            font-weight: 600;
            color: #333;
        }

        .event-time {
            color: #666;
            font-size: 12px;
        }

        .event-title {
            color: #667eea;
            font-weight: 500;
        }

        .event-location {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .no-events {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #34a853 0%, #1f9e3e 100%);
            color: white;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
        }

        .btn-register:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .status-message.loading {
            background: #cfe2ff;
            color: #084298;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 15px;
            }
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #1565c0;
            margin-bottom: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 予定登録</h1>
            <p>Googleカレンダーに複数の予定を一度に登録</p>
        </div>

        <div class="content">
            <!-- 音声入力セクション -->
            <div class="section">
                <div class="section-title">📢 音声入力</div>
                <div class="info-box">
                    複数の予定を一度に言ってください。例：「1月1日9時から3時、み仕事、1月2日10時から2時、卓球」
                </div>
                <div class="voice-input-area">
                    <button class="btn-primary" id="recordBtn">🎤 話す</button>
                    <button class="btn-secondary" id="clearBtn">クリア</button>
                </div>
            </div>

            <!-- テキスト表示セクション -->
            <div class="section">
                <div class="section-title">📝 認識テキスト</div>
                <div class="text-display empty" id="textDisplay">タップして音声入力してください</div>
            </div>

            <!-- Google認証セクション -->
            <div class="section">
                <div class="section-title">🔐 Google認証</div>
                <button class="btn-primary" id="googleLoginBtn" style="width: 100%;">
                    🔓 Googleでサインイン
                </button>
                <div id="authStatus" style="text-align: center; margin-top: 10px; font-size: 13px; color: #666; display: none;">
                    ✓ Googleアカウントでログイン済み
                </div>
            </div>

            <div class="divider"></div>

            <!-- タイトル選択セクション -->
            <div class="section">
                <div class="section-title">🏷️ デフォルトタイトル</div>
                <select class="title-select" id="titleSelect">
                    <option value="">タイトルを選択（未指定）</option>
                    <option value="み　仕事">み　仕事</option>
                    <option value="卓球">卓球</option>
                    <option value="ここせん">ここせん</option>
                    <option value="ひ">ひ</option>
                    <option value="み">み</option>
                    <option value="純">純</option>
                    <option value="成">成</option>
                    <option value="想">想</option>
                    <option value="custom">その他（手動入力）</option>
                </select>
                <input type="text" class="custom-input" id="customInput" placeholder="カスタムタイトルを入力">
            </div>

            <div class="divider"></div>

            <!-- 抽出予定一覧セクション -->
            <div class="section">
                <div class="section-title">📋 抽出された予定</div>
                <div class="events-list" id="eventsList">
                    <div class="no-events">予定が検出されていません</div>
                </div>
            </div>

            <!-- 登録ボタン -->
            <button class="btn-register" id="registerBtn" disabled>
                ✓ Googleカレンダーに登録
            </button>

            <!-- ステータスメッセージ -->
            <div class="status-message" id="statusMessage"></div>
        </div>
    </div>

    <script>
        // ===== Google Calendar API設定 =====
        // 重要: セットアップガイドに従って、以下を設定してください
        const GOOGLE_CLIENT_ID = '8880616614-a28l4bdoaias61s7hi36pgrvrhbfc117.apps.googleusercontent.com'; // Google Cloud Consoleから取得
        const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar';
        const GOOGLE_CALENDAR_ID = 'primary'; // 'primary' = あなたのメインカレンダー

        let googleAccessToken = null;
        let googleTokenExpiryTime = null;

        // ===== 変数定義 =====
        const recordBtn = document.getElementById('recordBtn');
        const clearBtn = document.getElementById('clearBtn');
        const textDisplay = document.getElementById('textDisplay');
        const titleSelect = document.getElementById('titleSelect');
        const customInput = document.getElementById('customInput');
        const eventsList = document.getElementById('eventsList');
        const registerBtn = document.getElementById('registerBtn');
        const statusMessage = document.getElementById('statusMessage');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authStatus = document.getElementById('authStatus');

        let recognitionText = '';
        let extractedEvents = [];
        let isRecording = false;
        let recognition = null;

        // Web Speech API の初期化
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.textContent = '🎤 聞き取り中...';
                textDisplay.textContent = '';
                textDisplay.classList.remove('empty');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i].transcript;
                    if (event.results[i].isFinal) {
                        recognitionText += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                textDisplay.textContent = recognitionText + interimTranscript;
            };

            recognition.onerror = (event) => {
                showStatus(`エラー: ${event.error}`, 'error');
            };

            recognition.onend = () => {
                isRecording = false;
                recordBtn.classList.remove('recording');
                recordBtn.textContent = '🎤 話す';
                parseEvents();
            };
        }

        // 音声入力開始/停止
        recordBtn.addEventListener('click', () => {
            if (!recognition) {
                showStatus('お使いのブラウザは音声認識に対応していません', 'error');
                return;
            }

            if (isRecording) {
                recognition.stop();
            } else {
                recognitionText = '';
                recognition.start();
            }
        });

        // クリアボタン
        clearBtn.addEventListener('click', () => {
            recognitionText = '';
            textDisplay.textContent = 'タップして音声入力してください';
            textDisplay.classList.add('empty');
            extractedEvents = [];
            eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
            registerBtn.disabled = true;
            statusMessage.className = 'status-message';
        });

        // カスタム入力の表示/非表示
        titleSelect.addEventListener('change', () => {
            if (titleSelect.value === 'custom') {
                customInput.classList.add('show');
                customInput.focus();
            } else {
                customInput.classList.remove('show');
            }
        });

        // 日程解析エンジン
        function parseEvents() {
            const text = recognitionText.trim();
            if (!text) return;

            extractedEvents = [];
            const selectedTitle = titleSelect.value === 'custom' ? customInput.value : titleSelect.value;

            // テキストを「月日」で始まるセグメントに分割
            const eventSegments = extractEventSegments(text);

            for (let segment of eventSegments) {
                const event = parseEventSegment(segment, selectedTitle);
                if (event) {
                    extractedEvents.push(event);
                }
            }

            displayEvents();
            registerBtn.disabled = extractedEvents.length === 0;
        }

        function extractEventSegments(text) {
            // 「月日」パターンで分割
            const segments = [];
            const pattern = /(\d{1,2}月\d{1,2}日)/g;
            let lastIndex = 0;
            let match;

            while ((match = pattern.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    // 前のセグメントの終了
                    if (segments.length > 0) {
                        // 前のセグメントに残りの情報を追加
                    }
                }
                segments.push(match[0]);
                lastIndex = match.index + match[0].length;
            }

            // 全テキストを再度処理してセグメントを確定
            const result = [];
            const matches = text.matchAll(/(\d{1,2}月\d{1,2}日)[\s\S]*?(?=\d{1,2}月\d{1,2}日|$)/g);

            for (let match of matches) {
                result.push(match[0]);
            }

            return result.length > 0 ? result : [text];
        }

        function parseEventSegment(segment, defaultTitle) {
            // 日付を抽出
            const dateMatch = segment.match(/(\d{1,2})月(\d{1,2})日/);
            if (!dateMatch) return null;

            const date = `${dateMatch[1]}月${dateMatch[2]}日`;
            const afterDate = segment.substring(dateMatch.index + dateMatch[0].length).trim();

            // 時間パターンの強化版
            // 対応する形式：
            // 9時から3時
            // 9時から15時
            // 9時から午後3時
            // 午前9時から午後3時
            // 9:00から15:00
            // 9:30から2時半
            // etc.

            const timePattern = /^[\s、]*([0-2]?\d)(?:[時:\s]([0-5]\d)?)?[\s]*(?:から|～)[\s]*(?:午後)?([0-2]?\d)(?:[時:\s]([0-5]\d)?)?(?:半)?/;
            const timeMatch = afterDate.match(timePattern);

            if (!timeMatch) return null;

            const startHour = parseInt(timeMatch[1]);
            const startMin = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
            const endHour = parseInt(timeMatch[3]);
            const endMin = timeMatch[4] ? parseInt(timeMatch[4]) : 0;

            // 午後判定（エンドタイムが開始時間より小さい場合は午後と判定）
            let correctedEndHour = endHour;
            if (endHour < startHour && endHour < 12) {
                correctedEndHour = endHour + 12;
            }

            const startTime = `${String(startHour).padStart(2, '0')}:${String(startMin).padStart(2, '0')}`;
            const endTime = `${String(correctedEndHour).padStart(2, '0')}:${String(endMin).padStart(2, '0')}`;

            // 時間後の情報（タイトル、場所）を抽出
            const afterTime = afterDate.substring(timeMatch.index + timeMatch[0].length).trim();
            let title = defaultTitle || '予定';
            let location = '';

            if (afterTime) {
                // タイトルと場所を分割
                const parts = afterTime.split(/、|　|、|・/);
                const knownTitles = ['み仕事', 'み　仕事', '卓球', 'ここせん', 'ひ', 'み', '純', '成', '想'];

                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i].trim();
                    if (!part) continue;

                    if (knownTitles.includes(part)) {
                        title = part;
                    } else if (!title || title === defaultTitle || title === '予定') {
                        title = part;
                    } else {
                        location = part;
                        break;
                    }
                }
            }

            return {
                date,
                startTime,
                endTime,
                title: title || '予定',
                location
            };
        }

        function displayEvents() {
            if (extractedEvents.length === 0) {
                eventsList.innerHTML = '<div class="no-events">予定が検出されていません</div>';
                return;
            }

            eventsList.innerHTML = extractedEvents.map((event, index) => `
                <div class="event-item">
                    <div class="event-date">📅 ${event.date}</div>
                    <div class="event-time">⏰ ${event.startTime} → ${event.endTime}</div>
                    <div class="event-title">${event.title}</div>
                    ${event.location ? `<div class="event-location">📍 ${event.location}</div>` : ''}
                </div>
            `).join('');
        }

        // Google Calendar 登録（後で実装）
        registerBtn.addEventListener('click', async () => {
            if (extractedEvents.length === 0) return;

            showStatus('<span class="loading-spinner"></span> 登録中...', 'loading');
            registerBtn.disabled = true;

            try {
                // ここにGoogle Calendar API統合コードが入ります
                // 一度に複数の予定を登録
                await registerToGoogleCalendar(extractedEvents);
                showStatus('✓ ' + extractedEvents.length + '件の予定を登録しました！', 'success');
                recognitionText = '';
                extractedEvents = [];
                displayEvents();
                textDisplay.textContent = 'タップして音声入力してください';
                textDisplay.classList.add('empty');
            } catch (error) {
                showStatus('❌ 登録に失敗しました: ' + error.message, 'error');
            } finally {
                registerBtn.disabled = extractedEvents.length === 0;
            }
        });

        // Google認証
        async function authenticateGoogle() {
            return new Promise((resolve, reject) => {
                // トークンがまだ有効か確認
                if (googleAccessToken && googleTokenExpiryTime && new Date() < googleTokenExpiryTime) {
                    resolve(googleAccessToken);
                    return;
                }

                // Google OAuth 2.0フロー
                const redirectUri = window.location.origin + window.location.pathname;
                const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
                authUrl.searchParams.append('client_id', GOOGLE_CLIENT_ID);
                authUrl.searchParams.append('redirect_uri', redirectUri);
                authUrl.searchParams.append('response_type', 'token');
                authUrl.searchParams.append('scope', GOOGLE_SCOPES);
                authUrl.searchParams.append('access_type', 'online');

                // ローカルストレージでリダイレクト待機状態を記録
                localStorage.setItem('awaiting_auth', 'true');

                // 新しいウィンドウでGoogleログインを開く（または別タブ）
                const authWindow = window.open(authUrl.toString(), 'google_auth', 'width=500,height=600');

                // リダイレクト後のトークン取得をチェック
                const checkToken = setInterval(() => {
                    const hash = window.location.hash;
                    if (hash && hash.includes('access_token')) {
                        clearInterval(checkToken);
                        localStorage.removeItem('awaiting_auth');

                        // ハッシュからトークンを抽出
                        const params = new URLSearchParams(hash.substring(1));
                        googleAccessToken = params.get('access_token');
                        const expiresIn = parseInt(params.get('expires_in')) || 3600;
                        googleTokenExpiryTime = new Date(Date.now() + expiresIn * 1000);

                        // ハッシュをクリア
                        window.location.hash = '';

                        // ローカルストレージに保存
                        localStorage.setItem('google_access_token', googleAccessToken);
                        localStorage.setItem('google_token_expiry', googleTokenExpiryTime.toISOString());

                        resolve(googleAccessToken);
                    }
                }, 500);

                // タイムアウト（5分）
                setTimeout(() => {
                    clearInterval(checkToken);
                    if (authWindow) authWindow.close();
                    reject(new Error('Google認証がタイムアウトしました'));
                }, 300000);
            });
        }

        // ページロード時に保存されたトークンを復元
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('google_access_token');
            const savedExpiry = localStorage.getItem('google_token_expiry');

            if (savedToken && savedExpiry) {
                const expiryTime = new Date(savedExpiry);
                if (expiryTime > new Date()) {
                    googleAccessToken = savedToken;
                    googleTokenExpiryTime = expiryTime;
                    updateAuthStatus();
                } else {
                    // トークンが期限切れなので削除
                    localStorage.removeItem('google_access_token');
                    localStorage.removeItem('google_token_expiry');
                }
            }
        });

        function updateAuthStatus() {
            if (googleAccessToken) {
                googleLoginBtn.textContent = '✓ ログイン済み';
                googleLoginBtn.style.background = 'linear-gradient(135deg, #34a853 0%, #1f9e3e 100%)';
                authStatus.style.display = 'block';
            } else {
                googleLoginBtn.textContent = '🔓 Googleでサインイン';
                googleLoginBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                authStatus.style.display = 'none';
            }
        }

        // Googleログインボタン
        googleLoginBtn.addEventListener('click', async () => {
            if (googleAccessToken) {
                // ログアウト
                if (confirm('Googleアカウントからログアウトしますか？')) {
                    googleAccessToken = null;
                    googleTokenExpiryTime = null;
                    localStorage.removeItem('google_access_token');
                    localStorage.removeItem('google_token_expiry');
                    updateAuthStatus();
                    showStatus('ログアウトしました', 'success');
                }
            } else {
                // ログイン
                try {
                    googleLoginBtn.disabled = true;
                    googleLoginBtn.textContent = '認証中...';
                    await authenticateGoogle();
                    updateAuthStatus();
                    showStatus('✓ Googleアカウントでログインしました', 'success');
                } catch (error) {
                    showStatus('❌ ' + error.message, 'error');
                } finally {
                    googleLoginBtn.disabled = false;
                    updateAuthStatus();
                }
            }
        });

        async function registerToGoogleCalendar(events) {
            if (!events || events.length === 0) {
                throw new Error('登録する予定がありません');
            }

            if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === '') {
                throw new Error('Google Calendar APIが設定されていません。セットアップガイドを確認してください。');
            }

            // Google認証
            try {
                const accessToken = await authenticateGoogle();

                // 複数の予定を一度に登録
                const results = await Promise.all(
                    events.map(event => createCalendarEvent(accessToken, event))
                );

                return results;
            } catch (error) {
                throw new Error('Google認証に失敗しました: ' + error.message);
            }
        }

        async function createCalendarEvent(accessToken, eventData) {
            // 日付と時刻を結合してISO 8601形式に変換
            const [month, day] = eventData.date.match(/(\d{1,2})月(\d{1,2})日/).slice(1, 3);
            const year = new Date().getFullYear();

            const startDateTime = new Date(year, month - 1, day,
                parseInt(eventData.startTime.split(':')[0]),
                parseInt(eventData.startTime.split(':')[1]));

            const endDateTime = new Date(year, month - 1, day,
                parseInt(eventData.endTime.split(':')[0]),
                parseInt(eventData.endTime.split(':')[1]));

            // 年が過去の場合は来年に設定
            if (startDateTime < new Date()) {
                startDateTime.setFullYear(year + 1);
                endDateTime.setFullYear(year + 1);
            }

            const eventBody = {
                summary: eventData.title || '予定',
                description: eventData.location ? `場所: ${eventData.location}` : '',
                location: eventData.location || '',
                start: {
                    dateTime: startDateTime.toISOString(),
                    timeZone: 'Asia/Tokyo'
                },
                end: {
                    dateTime: endDateTime.toISOString(),
                    timeZone: 'Asia/Tokyo'
                }
            };

            const response = await fetch(
                `https://www.googleapis.com/calendar/v3/calendars/${GOOGLE_CALENDAR_ID}/events`,
                {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(eventBody)
                }
            );

            if (!response.ok) {
                const error = await response.json();
                throw new Error(`カレンダー登録エラー: ${error.error.message}`);
            }

            return await response.json();
        }

        function showStatus(message, type) {
            statusMessage.className = `status-message ${type}`;
            statusMessage.innerHTML = message;
            if (type === 'success') {
                setTimeout(() => {
                    statusMessage.className = 'status-message';
                }, 3000);
            }
        }
    </script>
</body>
